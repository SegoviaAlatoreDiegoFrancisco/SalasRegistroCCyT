<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Salas - Docentes</title>
</head>
<body>
    {% extends "admin.html" %}
    {% block admin_content %}
    <h2>Gestión de Alumnos</h2>

    {% if message %}
    <div class="message {{ 'success' if 'satisfactoriamente' in message else 'error' }}">
        {{ message }}
    </div>
    {% endif %}
    <ul>
        {% for alumno in alumnos %}
        <li>{{ alumno.matricula }} - {{ alumno.nombre }}
            <form action="/alumnos/borrar/{{ alumno.matricula }}" method="POST" style="display:inline;">
                <button type="submit">Eliminar</button>
            </form>
        </li>
        {% endfor %}     
    </ul>
    <h3>Agregar Alumno</h3>
    <form method="POST" action="/alumnos/agregar">
        <input type="text" name="matricula" placeholder="Matricula" required>
        <input type="text" name="nombre" placeholder="Nombre" required>
        <button type="submit">Guardar</button>
    </form>
    {% endblock %}
</body>
</html>
